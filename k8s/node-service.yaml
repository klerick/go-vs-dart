apiVersion: v1
kind: Service
metadata:
  name: node-service
  namespace: bench
spec:
  selector:
    app: node-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-service
  namespace: bench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-service
  template:
    metadata:
      labels:
        app: node-service
    spec:
      nodeSelector:
        kubernetes.io/hostname: your-app-node
      containers:
        - name: node-service
          image: your-registry.example.com/library/node-bench:latest
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: POSTGRES_URL
              value: "postgres://bench:bench@postgres:5432/bench?sslmode=disable"
            - name: REDIS_URL
              value: "redis://redis:6379"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "1000m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
