apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  namespace: bench
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: seed-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              until redis-cli -h redis ping 2>/dev/null | grep -q PONG; do sleep 1; done
              echo "Seeding Redis with 100 users..."
              for i in $(seq 1 100); do
                redis-cli -h redis SET "user:$i" "{\"id\":$i,\"name\":\"User $i\",\"email\":\"user${i}@bench.test\"}"
              done
              echo "Done seeding Redis."
      containers:
        - name: seed-postgres
          image: postgres:17-alpine
          env:
            - name: PGHOST
              value: postgres
            - name: PGUSER
              value: bench
            - name: PGPASSWORD
              value: bench
            - name: PGDATABASE
              value: bench
          command:
            - sh
            - -c
            - |
              echo "Waiting for Postgres..."
              until pg_isready -h postgres -U bench 2>/dev/null; do sleep 1; done

              echo "Seeding 100k orders..."
              psql <<'SQL'
              TRUNCATE orders RESTART IDENTITY;

              INSERT INTO orders (user_id, product_id, quantity, total, created_at)
              SELECT
                (random() * 99 + 1)::int,
                (random() * 99 + 1)::int,
                (random() * 4 + 1)::int,
                (random() * 500 + 1)::numeric(10,2),
                NOW() - (random() * interval '90 days')
              FROM generate_series(1, 100000);

              ANALYZE orders;
              SQL

              echo "Done. Row count:"
              psql -c "SELECT count(*) FROM orders;"